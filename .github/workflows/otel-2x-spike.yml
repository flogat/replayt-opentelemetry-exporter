# Non-merge-blocking OpenTelemetry 2.x readiness spike.
# COMPATIBILITY_MATRIX_SPEC §7.5; CI_SPEC §2.4; PUBLIC_API_SPEC §8 item 12.
# When PyPI has no paired opentelemetry-api / opentelemetry-sdk 2.x, the probe
# step leaves version empty and Ruff/pytest steps are skipped (§7.2 step 0).

name: OpenTelemetry 2.x spike

permissions:
  contents: read

'on':
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  otel-2x-spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install packaging (PyPI probe)
        run: |
          python -m pip install --upgrade pip
          pip install packaging

      - name: Probe PyPI for paired OpenTelemetry 2.x
        id: probe
        run: python scripts/otel_2x_probe.py --github-output

      - name: No OpenTelemetry 2.x on PyPI (spike skipped)
        if: steps.probe.outputs.version == ''
        run: |
          echo "No paired opentelemetry-api / opentelemetry-sdk 2.x on PyPI."
          echo "See COMPATIBILITY_MATRIX_SPEC §7.2 step 0; merge gate unchanged."

      - name: Install package and dev deps
        if: steps.probe.outputs.version != ''
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pin OpenTelemetry 2.x (API and SDK)
        if: steps.probe.outputs.version != ''
        run: |
          pip install --force-reinstall \
            "opentelemetry-api==${{ steps.probe.outputs.version }}" \
            "opentelemetry-sdk==${{ steps.probe.outputs.version }}"

      - name: Print resolved dependency versions (spike audit)
        if: steps.probe.outputs.version != ''
        run: |
          python - <<'PY'
          import importlib.metadata as m

          for dist in ("replayt", "opentelemetry-api", "opentelemetry-sdk"):
              print(dist, m.version(dist))
          PY

      - name: Ruff check
        if: steps.probe.outputs.version != ''
        run: ruff check src tests

      - name: Ruff format
        if: steps.probe.outputs.version != ''
        run: ruff format --check src tests

      - name: Run tests
        if: steps.probe.outputs.version != ''
        run: pytest -q
