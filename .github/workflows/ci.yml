name: CI

permissions:
  contents: read

'on':
  push:
    branches:
      - master
      # Mission Control backlog workflows push mc/backlog-* before CI poll
      - "mc/**"
  pull_request:
    branches:
      - master
      - "mc/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            replayt: "0.4.0"
            otel: "1.20.0"
          - python-version: "3.11"
            replayt: "0.4.0"
            otel: "1.40.0"
          - python-version: "3.11"
            replayt: "latest"
            otel: "1.20.0"
          - python-version: "3.11"
            replayt: "latest"
            otel: "1.40.0"
          - python-version: "3.12"
            replayt: "0.4.0"
            otel: "1.20.0"
          - python-version: "3.12"
            replayt: "0.4.0"
            otel: "1.40.0"
          - python-version: "3.12"
            replayt: "latest"
            otel: "1.20.0"
          - python-version: "3.12"
            replayt: "latest"
            otel: "1.40.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply matrix pins (replayt + OpenTelemetry API/SDK)
        run: |
          pip install --force-reinstall \
            "opentelemetry-api==${{ matrix.otel }}" \
            "opentelemetry-sdk==${{ matrix.otel }}"
          if [ "${{ matrix.replayt }}" = "latest" ]; then
            pip install --upgrade --force-reinstall replayt
          else
            pip install --force-reinstall "replayt==${{ matrix.replayt }}"
          fi
      - name: Print resolved dependency versions (matrix audit)
        run: |
          python - <<'PY'
          import importlib.metadata as m

          for dist in ("replayt", "opentelemetry-api", "opentelemetry-sdk"):
              print(dist, m.version(dist))
          PY
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: Run tests
        run: pytest -q

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # PyPA pip-audit has no --severity-high; --ignore-vuln only for CVEs in docs/DEPENDENCY_AUDIT.md
      - name: Run supply-chain audit
        run: pip-audit --ignore-vuln CVE-2026-4539 --desc
