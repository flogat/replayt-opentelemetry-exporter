name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      # Mission Control backlog workflows push mc/backlog-* before CI poll
      - "mc/**"
  pull_request:
    branches:
      - main
      - master
      - "mc/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: Run tests
        run: pytest -q

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # PyPA pip-audit has no --severity-high; --ignore-vuln only for CVEs in docs/DEPENDENCY_AUDIT.md
      - name: Run supply-chain audit
        run: pip-audit --ignore-vuln CVE-2026-4539 --desc
